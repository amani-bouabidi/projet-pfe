<div class="table-wrapper">
  <div class="table-header">
    <div class="header-left">
      <h2>{{ title }}</h2>
      <span class="total-count">{{ pagination.totalItems }} items</span>
    </div>

  <div class="header-right">
    <div class="filter-group">
      <div class="search-wrapper">

                <span class="search-icon">
                  <button>
                  <svg width="18"
                       height="18"
                       viewBox="0 0 24 24"
                       fill="none"
                       xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"/>
                  </svg>
                  </button>
                </span>

        <input type="text"
        placeholder="Search..."
        [(ngModel)]="searchText"
        (ngModelChange)="onSearchChange()"
        class="search-input">
      <select
        [(ngModel)]="selectedCity"
        (ngModelChange)="applyFilters()"
        class="filter-select">
          <option value="">All Cities</option>
          <option *ngFor="let city of uniqueCities" [value]="city">{{ city }}</option>
      </select>

      <button *ngIf="searchText || selectedCity" (click)="clearFilters()" class="clear-filters-btn">Clear Filters</button>
    </div>

    <button *ngIf="enableActions" (click)="onAddRow()" class="add-btn">+</button>
  </div>
</div>

<div class="table-responsive">
  <table>
    <thead>
      <tr>
        <th *ngFor="let col of columns">{{ col | titlecase }}</th>
        <th *ngIf="enableActions">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of filteredData">
        <td *ngFor="let col of columns">{{ row[col] }}</td>
        <td *ngIf="enableActions">
          <button (click)="onEditRow(row)">Edit</button>
          <button (click)="onDeleteRow(row)">Delete</button>
        </td>
      </tr>

      <tr *ngIf="data.length === 0">
        <td [attr.colspan]="columns.length + (enableActions ? 1 : 0)">No data available</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="pagination-wrapper" *ngIf="filteredData.length > 0">
  <button (click)="prevPage()" [disabled]="pagination.currentPage === 1">← Prev</button>
  <span>{{ pagination.currentPage }} / {{ pagination.totalPages }}</span>
  <button (click)="nextPage()" [disabled]="pagination.currentPage === pagination.totalPages">Next →</button>
</div>
</div>
