<div class="formateur-container">

  <!-- Header -->
  <div class="page-header">
    <h1>Gérer les Formateurs</h1>
  </div>

  <!-- Search -->
  <mat-card class="search-card">
    <mat-card-content>
      <div class="search-wrapper">
        <mat-icon>search</mat-icon>

        <input
          type="text"
          placeholder="Rechercher..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()">

        <button *ngIf="searchTerm" (click)="searchTerm=''; onSearch()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Form -->
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>
        {{ isEditing ? 'Modifier' : 'Ajouter' }} Formateur
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <form [formGroup]="formateurForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="nom">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Prénom</mat-label>
          <input matInput formControlName="prenom">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">
          {{ isEditing ? 'Modifier' : 'Ajouter' }}
        </button>

        <button *ngIf="isEditing" mat-button (click)="resetForm()">
          Annuler
        </button>

      </form>

    </mat-card-content>
  </mat-card>

  <!-- 📋 Table -->
  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title>Liste des formateurs</mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <table mat-table [dataSource]="filteredFormateurs">

        <!-- Nom -->
        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef>Nom</th>
          <td mat-cell *matCellDef="let f">{{ f.nom }}</td>
        </ng-container>

        <!-- Prenom -->
        <ng-container matColumnDef="prenom">
          <th mat-header-cell *matHeaderCellDef>Prénom</th>
          <td mat-cell *matCellDef="let f">{{ f.prenom }}</td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let f">{{ f.email }}</td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let f">
            {{ f.createdAt | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let f">

            <button mat-icon-button color="primary"
                    (click)="editFormateur(f)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn"
                    (click)="deleteFormateur(f.id)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['nom','prenom','email','createdAt','actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['nom','prenom','email' ,'createdAt', 'actions']"></tr>

      </table>

      <div *ngIf="filteredFormateurs.length === 0">
        Aucun formateur
      </div>

    </mat-card-content>
  </mat-card>

</div>
