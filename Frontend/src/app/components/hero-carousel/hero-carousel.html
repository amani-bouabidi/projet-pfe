<div class="hero-carousel"
     (mouseenter)="onMouseEnter()"
     (mouseleave)="onMouseLeave()"
     role="region"
     aria-label="Hero carousel">

  <!-- Slides Container -->
  <div class="slides-container">
    @for (slide of slides; track slide.id; let i = $index) {
      <div class="slide"
           [class.active]="i === currentIndex"
           [@slideAnimation]="i === currentIndex ? (i > currentIndex ? ':increment' : ':decrement') : ''">

        <!-- Background Image with Gradient Overlay -->
        <div class="slide-background">
          <img [src]="slide.imageUrl" [alt]="slide.title" loading="eager">
          <div class="gradient-overlay" [style.background]="slide.gradient"></div>
        </div>

        <!-- Slide Content -->
        <div class="slide-content">
          <div class="container">
            <h1 class="slide-title">{{ slide.title }}</h1>
            <p class="slide-subtitle">{{ slide.subtitle }}</p>
            <a [routerLink]="slide.ctaLink" class="cta-button">
              {{ slide.ctaText }}
              <span class="button-arrow">→</span>
            </a>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Navigation Arrows -->
  <button class="nav-arrow prev-arrow"
          (click)="previousSlide()"
          aria-label="Previous slide"
          [attr.aria-disabled]="false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <button class="nav-arrow next-arrow"
          (click)="nextSlide()"
          aria-label="Next slide"
          [attr.aria-disabled]="false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

  <!-- Navigation Dots -->
  <div class="dots-container" role="tablist" aria-label="Slide navigation">
    @for (slide of slides; track slide.id; let i = $index) {
      <button class="dot"
              [class.active]="i === currentIndex"
              (click)="goToSlide(i)"
              [attr.aria-label]="'Go to slide ' + (i + 1)"
              [attr.aria-selected]="i === currentIndex">
        <span class="dot-inner"></span>
      </button>
    }
  </div>

  <!-- Slide Counter (Optional) -->
  <div class="slide-counter" aria-live="polite">
    {{ currentIndex + 1 }} / {{ slides.length }}
  </div>
</div>
