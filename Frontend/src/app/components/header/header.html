<header class="header">
  <div class="left">
    <button class="menu-btn" (click)="toggleSidebar()" title="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="logo">
      <img src="images/ira_logo_hd.png" alt="IRA logo">
      <span>Institut des Régions Arides</span>
    </div>
  </div>

  <div class="right">
    <button class="icon-btn" title="Profile">
      <svg width="20" height="20" fill="#333" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
      </svg>
    </button>

    <button class="icon-btn logout-button" (click)="logout()" title="Logout">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#333">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
    </button>
  </div>
</header>
