<div class="formateur-container">

  <!-- Header -->
  <div class="page-header">
    <h1>Gérer les Apprenants</h1>
  </div>

  <!-- 🔍 Search -->
  <mat-card class="search-card">
    <mat-card-content>
      <div class="search-wrapper">
        <mat-icon>search</mat-icon>

        <input
          type="text"
          placeholder="Rechercher..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()">

        <button *ngIf="searchTerm" (click)="searchTerm=''; onSearch()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- 📋 Table -->
  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title>Liste des apprenants</mat-card-title>
      <mat-card-subtitle>
        {{ filteredApprenants.length }} apprenant(s)
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>

      <table mat-table [dataSource]="filteredApprenants">

        <!-- Nom -->
        <ng-container matColumnDef="nom">
          <th mat-header-cell *matHeaderCellDef>Nom</th>
          <td mat-cell *matCellDef="let a">{{ a.nom }}</td>
        </ng-container>

        <!-- Prenom -->
        <ng-container matColumnDef="prenom">
          <th mat-header-cell *matHeaderCellDef>Prénom</th>
          <td mat-cell *matCellDef="let a">{{ a.prenom }}</td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let a">{{ a.email }}</td>
        </ng-container>

        <!-- Date -->

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let a">
            {{ a.createdAt | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let a">

            <button mat-icon-button color="warn"
                    (click)="deleteApprenant(a.id)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['nom', 'prenom', 'email', 'createdAt', 'actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['nom', 'prenom', 'email', 'createdAt', 'actions']"></tr>

      </table>

      <div *ngIf="filteredApprenants.length === 0" class="no-data">
        Aucun apprenant
      </div>

    </mat-card-content>
  </mat-card>

</div>
