<div class="auth-container">
  <app-auth-left></app-auth-left>

  <div class="right-panel">
    <div class="form-wrapper">
      <h1>Inscription</h1>
      <p class="subtitle">Créez votre compte pour accéder à nos services</p>

      <form (ngSubmit)="register()">
        <div class="form-row">
          <div class="form-group half">
            <label>Prénom</label>
            <input [(ngModel)]="nom" name="firstName" placeholder="Votre prénom" required>
          </div>

          <div class="form-group half">
            <label>Nom</label>
            <input [(ngModel)]="prenom" name="lastName" placeholder="Votre nom" required>
          </div>
        </div>

        <div class="form-group full">
          <label>Email</label>
          <input [(ngModel)]="email" name="email" placeholder="votre.email@example.com" required>
        </div>

        <div class="form-group full">
          <label>Mot de passe</label>
          <input [(ngModel)]="password" name="password" type="password" placeholder="Votre mot de passe" required>
        </div>
        <button class="login-btn" type="submit">S'inscrire</button>

        <p class="register-link">Vous avez déjà un compte ? <a routerLink="/login">Se connecter</a></p>
      </form>
    </div>
  </div>
</div>
